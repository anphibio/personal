<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Peck deck">
  <defs>
    <linearGradient id="bg-peck" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf7f7"/>
      <stop offset="1" stop-color="#eee0e0"/>
    </linearGradient>
    <linearGradient id="metal-peck" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c8792"/>
      <stop offset=".5" stop-color="#d0d5da"/>
      <stop offset="1" stop-color="#626d78"/>
    </linearGradient>
    <linearGradient id="pad-peck" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#252a31"/>
      <stop offset="1" stop-color="#4a515b"/>
    </linearGradient>
    <filter id="shadow-peck" x="-20%" y="-20%" width="150%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="320" height="200" rx="22" fill="url(#bg-peck)"/>
  <ellipse cx="160" cy="162" rx="104" ry="15" fill="#decdcd"/>
  <g filter="url(#shadow-peck)">
    <rect x="150" y="62" width="20" height="70" rx="10" fill="url(#metal-peck)"/>
    <rect x="136" y="90" width="48" height="16" rx="8" fill="#f0a933"/>
    <path d="M138 98 98 80" fill="none" stroke="#1795cf" stroke-width="8" stroke-linecap="round"/>
    <path d="M182 98 222 80" fill="none" stroke="#1795cf" stroke-width="8" stroke-linecap="round"/>
    <circle cx="92" cy="78" r="10" fill="#39424d"/>
    <circle cx="228" cy="78" r="10" fill="#39424d"/>
    <rect x="108" y="148" width="104" height="8" rx="4" fill="#a0acb9"/>
    <rect x="145" y="58" width="30" height="8" rx="4" fill="#2a313b"/>
  </g>
  <text x="160" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Peck deck</text>
</svg>
