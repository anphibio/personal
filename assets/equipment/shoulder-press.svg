<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Shoulder press">
  <defs>
    <linearGradient id="bg-shoulder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f7fb"/>
      <stop offset="1" stop-color="#e4e7f1"/>
    </linearGradient>
    <linearGradient id="metal-shoulder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c8692"/>
      <stop offset=".48" stop-color="#d0d5dc"/>
      <stop offset="1" stop-color="#626d77"/>
    </linearGradient>
    <filter id="shadow-shoulder" x="-20%" y="-20%" width="150%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="320" height="200" rx="22" fill="url(#bg-shoulder)"/>
  <ellipse cx="160" cy="162" rx="102" ry="15" fill="#d6daea"/>
  <g filter="url(#shadow-shoulder)">
    <rect x="146" y="70" width="28" height="56" rx="14" fill="url(#metal-shoulder)"/>
    <rect x="132" y="92" width="56" height="15" rx="7.5" fill="#f0a933"/>
    <path d="M132 94 106 60" fill="none" stroke="#1795cf" stroke-width="8" stroke-linecap="round"/>
    <path d="M188 94 214 60" fill="none" stroke="#1795cf" stroke-width="8" stroke-linecap="round"/>
    <circle cx="100" cy="54" r="10" fill="#39424d"/>
    <circle cx="220" cy="54" r="10" fill="#39424d"/>
    <rect x="118" y="148" width="84" height="8" rx="4" fill="#a3aebb"/>
    <rect x="142" y="64" width="36" height="8" rx="4" fill="#28313a"/>
  </g>
  <text x="160" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Shoulder press</text>
</svg>
